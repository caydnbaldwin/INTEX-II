
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a38' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#7F77DD',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#04342c' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0F6E56' : '#1D9E75',
    tertiaryColor: dark ? '#1a1a10' : '#faeeda',
    tertiaryBorderColor: dark ? '#854F0B' : '#BA7517',
  },
  er: { diagramPadding: 20, layoutDirection: 'TB', minEntityWidth: 100, minEntityHeight: 75, entityPadding: 15, useMaxWidth: true }
});

const diagram = `erDiagram
  safehouses {
    int safehouse_id PK
    string safehouse_code
    string name
    string region
    string city
    string country
    string status
    int capacity_girls
    int current_occupancy
  }
  residents {
    int resident_id PK
    int safehouse_id FK
    string case_control_no
    string case_status
    date date_of_birth
    string case_category
    bool sub_cat_trafficked
    bool sub_cat_sexual_abuse
    bool is_pwd
    date date_of_admission
    string assigned_social_worker
    string reintegration_status
    string current_risk_level
    string plus30_more_fields
  }
  process_recordings {
    int recording_id PK
    int resident_id FK
    date session_date
    string social_worker
    string session_type
    int session_duration_minutes
    string emotional_state_observed
    bool concerns_flagged
    bool referral_made
  }
  home_visitations {
    int visitation_id PK
    int resident_id FK
    date visit_date
    string social_worker
    string visit_type
    string location_visited
    bool safety_concerns_noted
    string visit_outcome
  }
  education_records {
    int education_record_id PK
    int resident_id FK
    date record_date
    string program_name
    string education_level
    string attendance_status
    decimal attendance_rate
    decimal progress_percent
    string completion_status
  }
  health_wellbeing_records {
    int health_record_id PK
    int resident_id FK
    date record_date
    decimal weight_kg
    decimal height_cm
    decimal bmi
    decimal general_health_score
    bool medical_checkup_done
    bool psychological_checkup_done
  }
  intervention_plans {
    int plan_id PK
    int resident_id FK
    string plan_category
    string plan_description
    string services_provided
    date target_date
    string status
  }
  incident_reports {
    int incident_id PK
    int resident_id FK
    int safehouse_id FK
    date incident_date
    string incident_type
    string severity
    bool resolved
    string reported_by
  }
  partners {
    int partner_id PK
    string partner_name
    string partner_type
    string role_type
    string contact_name
    string email
    string region
    string status
  }
  partner_assignments {
    int assignment_id PK
    int partner_id FK
    int safehouse_id FK
    string program_area
    date assignment_start
    date assignment_end
    bool is_primary
    string status
  }
  supporters {
    int supporter_id PK
    string supporter_type
    string display_name
    string organization_name
    string relationship_type
    string region
    string email
    date first_donation_date
  }
  donations {
    int donation_id PK
    int supporter_id FK
    int referral_post_id FK
    int created_by_partner_id FK
    string donation_type
    date donation_date
    string currency_code
    decimal amount
    bool is_recurring
    string campaign_name
  }
  donation_allocations {
    int allocation_id PK
    int donation_id FK
    int safehouse_id FK
    string program_area
    decimal amount_allocated
    date allocation_date
  }
  in_kind_donation_items {
    int item_id PK
    int donation_id FK
    string item_name
    string item_category
    int quantity
    string unit_of_measure
    decimal estimated_unit_value
    string received_condition
  }
  social_media_posts {
    int post_id PK
    string platform
    string post_url
    datetime created_at
    string post_type
    string content_topic
    int impressions
    int reach
    decimal engagement_rate
    int donation_referrals
    string campaign_name
    string plus25_more_fields
  }
  safehouse_monthly_metrics {
    int metric_id PK
    int safehouse_id FK
    date month_start
    int active_residents
    decimal avg_education_progress
    decimal avg_health_score
    int incident_count
  }
  public_impact_snapshots {
    int snapshot_id PK
    date snapshot_date
    string headline
    string summary_text
    string metric_payload_json
    bool is_published
  }

  safehouses ||--o{ residents : houses
  safehouses ||--o{ incident_reports : reported_at
  safehouses ||--o{ partner_assignments : assigned_to
  safehouses ||--o{ donation_allocations : receives
  safehouses ||--o{ safehouse_monthly_metrics : tracks
  residents ||--o{ process_recordings : has
  residents ||--o{ home_visitations : has
  residents ||--o{ education_records : has
  residents ||--o{ health_wellbeing_records : has
  residents ||--o{ intervention_plans : has
  residents ||--o{ incident_reports : involved_in
  partners ||--o{ partner_assignments : assigned_via
  partners ||--o{ donations : referred_by
  supporters ||--o{ donations : gives
  donations ||--o{ donation_allocations : split_into
  donations ||--o{ in_kind_donation_items : contains
  social_media_posts ||--o{ donations : referred
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
