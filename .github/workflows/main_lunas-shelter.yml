# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - lunas-shelter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run backend tests with 100% coverage gate
        run: >-
          dotnet test ./Backend.Tests/Backend.Tests.csproj
          --configuration Release
          /p:CollectCoverage=true
          /p:CoverletOutput=./TestResults/coverage/
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=100
          /p:ThresholdType=line,branch
          /p:ThresholdStat=total
          /p:ExcludeByFile="**/Migrations/*;**/*.g.cs;**/*.g.i.cs;**/*Designer.cs"

  frontend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests with 100% coverage gate
        run: npm run test:unit:coverage

      - name: Run Cypress smoke tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./Frontend
          start: npm run dev -- --host 0.0.0.0 --port 4200
          wait-on: http://localhost:4200
          wait-on-timeout: 120
          command: npm run test:e2e:smoke

  build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build ./Backend/Backend.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ./Backend/Backend.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2F995C2E8ADA47688973AC652197CC9E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4637F005178A4540ADDA17A77AB2C188 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B2A125EEFF7042CE813378E961013C13 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lunas-shelter'
          slot-name: 'Production'
          package: .
          