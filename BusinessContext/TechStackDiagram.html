<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Stack Diagram — Luna's Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <style>
    @font-face {
      font-family: 'Source Serif Pro';
      src: url('https://fonts.gstatic.com/s/sourceserifpro/v21/neIQzD-0qpwxpaWvJW_CGxGpHKseUVpGtiY.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Source Serif Pro';
      src: url('https://fonts.gstatic.com/s/sourceserifpro/v21/neIVzD-0qpwxpaWvJW_CGxGpHKse8PJfzqkmvQ.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }

    /* Force light mode — prevents VS Code / OS dark-mode from inverting the page */
    :root { color-scheme: light; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background-color: #ffffff;
      color: #171717;
      -webkit-font-smoothing: antialiased;
      padding: 64px 56px 80px;
    }

    h1 {
      font-family: 'Source Serif Pro', Georgia, serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #171717;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #737373;
      margin-bottom: 52px;
    }

    /* ── Flow row ── */
    .flow {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
    }

    /* ── Connector ── */
    .connector {
      display: flex;
      align-items: center;
      width: 52px;
      flex-shrink: 0;
    }
    .connector-line {
      flex: 1;
      height: 1.5px;
      background-color: #a3a3a3;
    }
    .connector-arrow {
      width: 0;
      height: 0;
      border-top:    5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left:   8px solid #a3a3a3;
    }

    /* ── Actor ── */
    .actor-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .actor-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #737373;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Tech node box ── */
    .tech-node {
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      background-color: #ffffff;
      overflow: hidden;
      flex-shrink: 0;
    }

    .node-header {
      background-color: #f5f5f5;
      border-bottom: 1.5px solid #e5e5e5;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .node-header-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background-color: #5b21b6;
      flex-shrink: 0;
    }
    .node-header-title {
      font-family: 'Source Serif Pro', Georgia, serif;
      font-size: 0.8125rem;
      font-weight: 700;
      color: #171717;
      letter-spacing: 0.01em;
    }

    .node-body {
      padding: 14px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .node-body.single-col {
      grid-template-columns: 1fr;
    }

    /* ── Logo item ── */
    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 72px;
    }

    /* devicon <i> tags */
    .logo-item i {
      font-size: 2.25rem;
      line-height: 1;
      display: block;
      width: 36px;
      height: 36px;
      text-align: center;
    }

    /* inline SVG logos */
    .logo-item .logo-svg {
      display: block;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    /* fallback badge (EF Core, shadcn) */
    .badge-icon {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      font-family: 'Inter', ui-sans-serif, sans-serif;
      flex-shrink: 0;
    }
    .badge-icon.ef { background-color: #5b21b6; color: #ffffff; }
    .badge-icon.ui { background-color: #171717; color: #ffffff; }

    .logo-label {
      font-size: 0.6rem;
      color: #737373;
      text-align: center;
      line-height: 1.3;
      font-weight: 500;
      letter-spacing: 0.01em;
      max-width: 72px;
    }
  </style>
</head>
<body>

  <h1>Tech Stack Diagram</h1>
  <p class="subtitle">Luna's Project — system architecture overview</p>

  <div class="flow">

    <!-- ── Actor ── -->
    <div class="actor-node">
      <svg width="44" height="64" viewBox="0 0 44 64" fill="none"
           stroke="#171717" stroke-width="1.75" stroke-linecap="round">
        <circle cx="22" cy="11" r="9"/>
        <line x1="22" y1="20" x2="22" y2="42"/>
        <line x1="7"  y1="30" x2="37" y2="30"/>
        <line x1="22" y1="42" x2="9"  y2="60"/>
        <line x1="22" y1="42" x2="35" y2="60"/>
      </svg>
      <span class="actor-label">User</span>
    </div>

    <div class="connector">
      <div class="connector-line"></div>
      <div class="connector-arrow"></div>
    </div>

    <!-- ── Frontend ── -->
    <div class="tech-node">
      <div class="node-header">
        <div class="node-header-dot"></div>
        <span class="node-header-title">Frontend</span>
      </div>
      <div class="node-body">

        <div class="logo-item">
          <i class="devicon-react-original colored"></i>
          <span class="logo-label">React 19</span>
        </div>

        <div class="logo-item">
          <i class="devicon-typescript-plain colored"></i>
          <span class="logo-label">TypeScript</span>
        </div>

        <div class="logo-item">
          <i class="devicon-vitejs-plain colored"></i>
          <span class="logo-label">Vite</span>
        </div>

        <div class="logo-item">
          <!-- Tailwind CSS — official path, 24×24 viewBox, explicit dimensions -->
          <svg class="logo-svg" width="36" height="36" viewBox="0 0 24 24"
               fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#38bdf8" d="M12.001 4.8c-3.2 0-5.2 1.6-6 4.8 1.2-1.6 2.6-2.2 4.2-1.8.913.228 1.565.89 2.288 1.624C13.666 10.618 15.027 12 18.001 12c3.2 0 5.2-1.6 6-4.8-1.2 1.6-2.6 2.2-4.2 1.8-.913-.228-1.565-.89-2.288-1.624C16.337 6.182 14.976 4.8 12.001 4.8zm-6 7.2c-3.2 0-5.2 1.6-6 4.8 1.2-1.6 2.6-2.2 4.2-1.8.913.228 1.565.89 2.288 1.624 1.177 1.194 2.538 2.576 5.512 2.576 3.2 0 5.2-1.6 6-4.8-1.2 1.6-2.6 2.2-4.2 1.8-.913-.228-1.565-.89-2.288-1.624C10.337 13.382 8.976 12 6.001 12z"/>
          </svg>
          <span class="logo-label">Tailwind CSS</span>
        </div>

        <div class="logo-item">
          <div class="badge-icon ui">ui</div>
          <span class="logo-label">shadcn/ui</span>
        </div>

      </div>
    </div>

    <div class="connector">
      <div class="connector-line"></div>
      <div class="connector-arrow"></div>
    </div>

    <!-- ── Backend ── -->
    <div class="tech-node">
      <div class="node-header">
        <div class="node-header-dot"></div>
        <span class="node-header-title">Backend</span>
      </div>
      <div class="node-body">

        <div class="logo-item">
          <i class="devicon-dot-net-plain-wordmark colored"></i>
          <span class="logo-label">ASP.NET Core</span>
        </div>

        <div class="logo-item">
          <i class="devicon-csharp-plain colored"></i>
          <span class="logo-label">C#</span>
        </div>

        <div class="logo-item">
          <div class="badge-icon ef">EF<br>Core</div>
          <span class="logo-label">Entity Framework</span>
        </div>

        <div class="logo-item">
          <i class="devicon-google-plain colored"></i>
          <span class="logo-label">Google OAuth</span>
        </div>

      </div>
    </div>

    <div class="connector">
      <div class="connector-line"></div>
      <div class="connector-arrow"></div>
    </div>

    <!-- ── Database ── -->
    <div class="tech-node">
      <div class="node-header">
        <div class="node-header-dot"></div>
        <span class="node-header-title">Database</span>
      </div>
      <div class="node-body single-col">

        <div class="logo-item">
          <i class="devicon-microsoftsqlserver-plain colored"></i>
          <span class="logo-label">SQL Server</span>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
